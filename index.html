<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #faf8ef 0%, #f4f1e8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #776e65;
            font-size: 80px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .score-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .score-box {
            background: #bbada0;
            padding: 10px 25px;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            min-width: 100px;
        }

        .score-label {
            font-size: 13px;
            color: #eee4da;
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 25px;
            color: white;
        }

        .controls {
            margin-bottom: 20px;
        }

        button {
            background: #8f7a66;
            color: #f9f6f2;
            border: none;
            border-radius: 3px;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        button:hover {
            background: #9f8a76;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .game-container {
            background: #bbada0;
            border-radius: 10px;
            padding: 15px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 15px;
            background: #bbada0;
            border-radius: 6px;
        }

        .grid-cell {
            background: rgba(238, 228, 218, 0.35);
            border-radius: 6px;
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 55px;
            font-weight: bold;
            color: #776e65;
            transition: all 0.15s ease;
            position: relative;
        }

        /* Tile colors */
        .tile-2 { background: #eee4da; color: #776e65; font-size: 55px; }
        .tile-4 { background: #ede0c8; color: #776e65; font-size: 55px; }
        .tile-8 { background: #f2b179; color: #f9f6f2; font-size: 55px; }
        .tile-16 { background: #f59563; color: #f9f6f2; font-size: 55px; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; font-size: 55px; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; font-size: 55px; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 45px; box-shadow: 0 0 10px rgba(243, 215, 116, 0.3); }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 45px; box-shadow: 0 0 15px rgba(243, 215, 116, 0.4); }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 45px; box-shadow: 0 0 20px rgba(243, 215, 116, 0.5); }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 35px; box-shadow: 0 0 25px rgba(243, 215, 116, 0.6); }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 35px; box-shadow: 0 0 30px rgba(243, 215, 116, 0.7); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .tile-new {
            animation: appear 0.2s ease;
        }

        @keyframes appear {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        .tile-merged {
            animation: pop 0.2s ease;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .game-over, .game-won {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .game-over.show, .game-won.show {
            opacity: 1;
            pointer-events: auto;
        }

        .game-over h2, .game-won h2 {
            font-size: 60px;
            color: #776e65;
            margin-bottom: 20px;
        }

        .game-won h2 {
            color: #edc22e;
        }

        .instructions {
            margin-top: 30px;
            color: #8f7a66;
            font-size: 16px;
            line-height: 1.6;
        }

        .instructions strong {
            color: #776e65;
        }

        @media (max-width: 520px) {
            h1 { font-size: 50px; }
            .grid-cell { font-size: 35px; }
            .tile-128, .tile-256, .tile-512 { font-size: 28px; }
            .tile-1024, .tile-2048 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2048</h1>
        
        <div class="score-container">
            <div class="score-box">
                <span class="score-label">Score</span>
                <span class="score-value" id="score">0</span>
            </div>
            <div class="score-box">
                <span class="score-label">Best</span>
                <span class="score-value" id="best-score">0</span>
            </div>
        </div>

        <div class="controls">
            <button onclick="newGame()">New Game</button>
        </div>

        <div class="game-container">
            <div class="grid-container" id="grid">
                <!-- Grid cells will be generated by JavaScript -->
            </div>
            
            <div class="game-over" id="game-over">
                <h2>Game Over!</h2>
                <button onclick="newGame()">Try Again</button>
            </div>
            
            <div class="game-won" id="game-won">
                <h2>You Win!</h2>
                <button onclick="continueGame()">Continue</button>
                <button onclick="newGame()">New Game</button>
            </div>
        </div>

        <div class="instructions">
            <strong>HOW TO PLAY:</strong> Use your <strong>arrow keys</strong> to move the tiles. 
            When two tiles with the same number touch, they <strong>merge into one!</strong>
        </div>
    </div>

    <script>
        let board = [];
        let score = 0;
        let bestScore = localStorage.getItem('bestScore2048') || 0;
        let hasWon = false;
        let isGameOver = false;

        // Initialize
        document.getElementById('best-score').textContent = bestScore;
        initGrid();
        newGame();

        function initGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.id = `cell-${i}`;
                grid.appendChild(cell);
            }
        }

        function newGame() {
            board = Array(4).fill(null).map(() => Array(4).fill(0));
            score = 0;
            hasWon = false;
            isGameOver = false;
            updateScore();
            document.getElementById('game-over').classList.remove('show');
            document.getElementById('game-won').classList.remove('show');
            addRandomTile();
            addRandomTile();
            render();
        }

        function addRandomTile() {
            const emptyCells = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] === 0) emptyCells.push({r, c});
                }
            }
            
            if (emptyCells.length > 0) {
                const {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4;
                return {r, c, value: board[r][c]};
            }
            return null;
        }

        function render() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const cell = document.getElementById(`cell-${r * 4 + c}`);
                    const value = board[r][c];
                    
                    cell.textContent = value || '';
                    cell.className = 'grid-cell' + (value ? ` tile-${value}` : '');
                }
            }
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestScore2048', bestScore);
                document.getElementById('best-score').textContent = bestScore;
            }
        }

        function slideRowLeft(row) {
            // Remove zeros
            let filtered = row.filter(val => val !== 0);
            
            // Merge adjacent equal numbers
            for (let i = 0; i < filtered.length - 1; i++) {
                if (filtered[i] === filtered[i + 1]) {
                    filtered[i] *= 2;
                    score += filtered[i];
                    filtered[i + 1] = 0;
                }
            }
            
            // Remove zeros again after merge
            filtered = filtered.filter(val => val !== 0);
            
            // Pad with zeros
            while (filtered.length < 4) filtered.push(0);
            
            return filtered;
        }

        function moveLeft() {
            let moved = false;
            for (let r = 0; r < 4; r++) {
                const oldRow = [...board[r]];
                board[r] = slideRowLeft(board[r]);
                if (oldRow.toString() !== board[r].toString()) moved = true;
            }
            return moved;
        }

        function moveRight() {
            let moved = false;
            for (let r = 0; r < 4; r++) {
                const oldRow = [...board[r]];
                board[r] = slideRowLeft(board[r].reverse()).reverse();
                if (oldRow.toString() !== board[r].toString()) moved = true;
            }
            return moved;
        }

        function moveUp() {
            let moved = false;
            for (let c = 0; c < 4; c++) {
                const col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                const oldCol = [...col];
                const newCol = slideRowLeft(col);
                for (let r = 0; r < 4; r++) {
                    board[r][c] = newCol[r];
                }
                if (oldCol.toString() !== newCol.toString()) moved = true;
            }
            return moved;
        }

        function moveDown() {
            let moved = false;
            for (let c = 0; c < 4; c++) {
                const col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                const oldCol = [...col];
                const newCol = slideRowLeft(col.reverse()).reverse();
                for (let r = 0; r < 4; r++) {
                    board[r][c] = newCol[r];
                }
                if (oldCol.toString() !== newCol.toString()) moved = true;
            }
            return moved;
        }

        function checkWin() {
            if (hasWon) return;
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] === 2048) {
                        hasWon = true;
                        document.getElementById('game-won').classList.add('show');
                        return;
                    }
                }
            }
        }

        function checkGameOver() {
            // Check for empty cells
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] === 0) return false;
                }
            }
            
            // Check for possible merges
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const val = board[r][c];
                    if ((r < 3 && board[r + 1][c] === val) ||
                        (c < 3 && board[r][c + 1] === val)) {
                        return false;
                    }
                }
            }
            
            return true;
        }

        function continueGame() {
            document.getElementById('game-won').classList.remove('show');
        }

        function makeMove(direction) {
            if (isGameOver) return;
            
            let moved = false;
            
            switch(direction) {
                case 'left': moved = moveLeft(); break;
                case 'right': moved = moveRight(); break;
                case 'up': moved = moveUp(); break;
                case 'down': moved = moveDown(); break;
            }
            
            if (moved) {
                const newTile = addRandomTile();
                updateScore();
                render();
                
                // Animate new tile
                if (newTile) {
                    const cell = document.getElementById(`cell-${newTile.r * 4 + newTile.c}`);
                    cell.classList.add('tile-new');
                    setTimeout(() => cell.classList.remove('tile-new'), 200);
                }
                
                checkWin();
                
                if (checkGameOver()) {
                    isGameOver = true;
                    document.getElementById('game-over').classList.add('show');
                }
            }
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }
            
            switch(e.key) {
                case 'ArrowLeft': makeMove('left'); break;
                case 'ArrowRight': makeMove('right'); break;
                case 'ArrowUp': makeMove('up'); break;
                case 'ArrowDown': makeMove('down'); break;
            }
        });

        // Touch controls for mobile
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            const minSwipe = 50;
            
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > minSwipe) {
                makeMove(dx > 0 ? 'right' : 'left');
            } else if (Math.abs(dy) > minSwipe) {
                makeMove(dy > 0 ? 'down' : 'up');
            }
        });
    </script>
</body>
</html>
